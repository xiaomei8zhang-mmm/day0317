services:
  backend:
    build:
      context: ../backend
      dockerfile: Dockerfile
    container_name: kidcare-backend
    restart: unless-stopped
    environment:
      NODE_ENV: production
      PORT: 3000
      DISABLE_DB: "true"
    networks:
      - kidcare-net

  frontend:
    build:
      context: ../frontend
      dockerfile: Dockerfile
      args:
        VITE_API_BASE: /api/v1
    container_name: kidcare-frontend
    restart: unless-stopped
    networks:
      - kidcare-net

  caddy:
    image: caddy:2.8-alpine
    container_name: kidcare-caddy
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config
    depends_on:
      - frontend
      - backend
    networks:
      - kidcare-net

networks:
  kidcare-net:
    driver: bridge

volumes:
  caddy_data:
  caddy_config:
